services:
  - type: web
    name: brokai-lead-intel-api
    env: python
    plan: free
    rootDir: brokai-lead-intel/backend
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
